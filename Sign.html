<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Here</title>
    <link rel="stylesheet" href="Sign.css">
    
</head>
<body>
    
   <div class="form-box">
                <form name="myForm" method="post" action="Dashboard.html">
                    <div class="title">Register Here</div>
                    <div class="form-container">
                        <div>
                        <label class="form-group">Name</label><br>
                        <input type="text" id="name" name="name" placeholder="Enter Name">
                        </div><p></p>
                         <div>
                        <label class="form-group">Email</label><br>
                        <input type="email" id="email" name="email" placeholder="Enter Email">
                         </div><p></p>
                       
                        <div>
                        <label class="form-group">Date of Birth</label><br>
                        <input type="date" id="dob" name="dob">
                        </div><p></p>
                        <div>
                            <label class="form-group">Gender</label><br>
                           <input type="text" id="gender" name="gender" placeholder="Male or Female">
                        </div><p></p>
                        <div>
                        <label class="form-group">Password</label><br>
                        <input type="password" id="password" name="password" placeholder="Enter Password">
                        </div><p></p>
                        <div>
                        <label class="form-group">Confirm Password</label><br>
                        <input type="password" id="cpassword" name="cpassword" placeholder="Confirm Password">
                        </div><p></p><p></p>
                        <button onclick="validate()">Sign up</button>
                     </div><p></p>
                     <div>
                     <p>Already Have a account ? <a href="Login.html">Log in</a></p>
                    </div>
                </form>
                
              </div>  
     
        </div>
    </div>
</div>  
<script src="script.js"></script>  
</body>
</html>
